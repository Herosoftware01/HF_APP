name: Deploy React App to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, x64]

    steps:

    # 1️⃣ Checkout repo safely
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        path: HF_APP_build
        clean: true  # ensures old files are removed safely

    # 2️⃣ Kill any lingering Node processes to avoid locked files
    - name: Kill Node processes (Windows)
      run: |
        taskkill /F /IM node.exe || echo "No node processes running"

    # 3️⃣ Install dependencies
    - name: Install Dependencies
      run: |
        cd HF_APP_build
        npm ci

    # 4️⃣ Build React App
    - name: Build React App
      run: |
        cd HF_APP_build
        npm run build

    # 5️⃣ Copy web.config into build folder
    - name: Copy web.config
      run: copy HF_APP_build\web.config HF_APP_build\build\web.config

    # 6️⃣ Stop IIS App Pool
    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "HF_FRONTEND"

    # 7️⃣ Deploy Build to IIS
    - name: Deploy Build
      run: |
        $dest = "D:\PRODUCTION_SOFTWEARE\frontend\dist"
        if (Test-Path $dest) {
          Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
        }
        Copy-Item HF_APP_build\build $dest -Recurse

    # 8️⃣ Start IIS App Pool
    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "HF_FRONTEND"