name: Deploy React App to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, x64]

    steps:

    - name: Stop Node Processes
      run: taskkill /F /IM node.exe
      continue-on-error: true

    - name: Clean Runner Workspace
      run: |
        if (Test-Path node_modules) { Remove-Item node_modules -Recurse -Force }
        if (Test-Path dist) { Remove-Item dist -Recurse -Force }

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: npm ci

    - name: Build React App
      run: npm run build

    - name: Copy web.config
      run: copy web.config dist\web.config

    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "HF_FRONTEND"

    - name: Deploy Build to IIS
      run: |
        if (Test-Path "D:\PRODUCTION_SOFTWEARE\frontend\dist") {
          Remove-Item "D:\PRODUCTION_SOFTWEARE\frontend\dist" -Recurse -Force
        }
        Copy-Item dist "D:\PRODUCTION_SOFTWEARE\frontend\dist" -Recurse

    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "HF_FRONTEND"